name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync curriculum JSON
        run: |
          cd curriculum
          python3 -c "from learning_loader import export_json; export_json()"

      - name: Write Firebase auth config (optional)
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          if [ -z "$FIREBASE_API_KEY" ]; then
            echo "No Firebase secrets — auth stays local-only (auth-config.js default)"
            exit 0
          fi
          cat > apps/learning/auth-config.js <<EOF
          window.AUTH_CONFIG = {
            enabled: true,
            firebase: {
              apiKey: "${FIREBASE_API_KEY}",
              authDomain: "${FIREBASE_AUTH_DOMAIN}",
              projectId: "${FIREBASE_PROJECT_ID}",
              storageBucket: "${FIREBASE_STORAGE_BUCKET}",
              messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID}",
              appId: "${FIREBASE_APP_ID}",
            },
          };
          EOF

      - name: Build static site
        run: |
          mkdir -p apps/learning/shared
          cp apps/shared/*.css apps/learning/shared/
          mkdir -p _site
          cp -r apps/learning/* _site/
          mkdir -p _site/decks
          cp exports/learning/*.pptx _site/decks/ 2>/dev/null || true
          mkdir -p _site/brd
          cp -r apps/brd/* _site/brd/
          mkdir -p _site/shared
          cp -r apps/shared/* _site/shared/
          cat > _site/brd-index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta http-equiv="refresh" content="0; url=./brd/" />
            <title>BRD Intake</title>
          </head>
          <body><p><a href="./brd/">Learning BRD Intake</a></p></body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
