name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install fastapi uvicorn pytest httpx pydantic scikit-learn pandas
      - run: python lab/setup_db.py
      - run: python lab/projects/credit-pd-model/train.py
      - run: pytest lab/projects/week33_fastapi/test_health.py
      - run: python lab/exercises/week32_run_eval.py
